<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIUX-330: Split Payments — Prototype Versions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: #f3f4f6;
        color: #020617;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
    }
    .container { max-width: 640px; width: 100%; }
    h1 { font-size: 32px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 40px; }
    .badge {
        display: inline-block; padding: 2px 10px; border-radius: 9999px;
        font-size: 12px; font-weight: 500; background: #0f62fe; color: #fff;
        margin-left: 8px; vertical-align: middle;
    }
    .version-grid { display: flex; flex-direction: column; gap: 16px; }
    .version-card {
        background: #fff; border: 1px solid #e5e7eb; border-radius: 16px;
        padding: 28px 32px; text-decoration: none; color: inherit;
        display: flex; align-items: center; gap: 20px;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    .version-card:hover {
        border-color: #0f62fe;
        box-shadow: 0 0 0 1px #0f62fe;
    }
    .version-num {
        width: 56px; height: 56px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; font-weight: 700; flex-shrink: 0;
    }
    .version-num.v1 { background: #f3f4f6; color: #6b7280; }
    .version-num.v2 { background: #eff6ff; color: #0f62fe; }
    .version-body h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .version-body p { font-size: 13px; color: #6b7280; line-height: 1.4; }
    .version-tag {
        display: inline-block; padding: 2px 8px; border-radius: 4px;
        font-size: 11px; font-weight: 500; margin-left: 8px; vertical-align: middle;
    }
    .tag-old { background: #f3f4f6; color: #6b7280; }
    .tag-new { background: #dcfce7; color: #16a34a; }
    .arrow { margin-left: auto; color: #9ca3af; font-size: 20px; flex-shrink: 0; }
</style>
</head>
<body>
    <div class="container">
        <h1>Split Payments<span class="badge">UIUX-330</span></h1>
        <p class="subtitle">Select a prototype version to view</p>

        <div class="version-grid">
            <a class="version-card" href="v1/index.html">
                <div class="version-num v1">V1</div>
                <div class="version-body">
                    <h2>Version 1 <span class="version-tag tag-old">Previous</span></h2>
                    <p>First iteration — CDN Tailwind + Lucide icons, inline color config. 6 pages.</p>
                </div>
                <span class="arrow">→</span>
            </a>
            <a class="version-card" href="v2/index.html">
                <div class="version-num v2">V2</div>
                <div class="version-body">
                    <h2>Version 2 <span class="version-tag tag-new">Latest</span></h2>
                    <p>Redesigned — Paysera UI tokens.css, semantic color tokens, improved layouts. 6 pages.</p>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
